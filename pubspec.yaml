name: nicc_calibration_app
description: An astonishing NICC Calibration Assistant with AI-powered recommendations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Animations
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  
  # State Management
  provider: ^6.1.1
  
  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # PDF Processing
  pdf: ^3.10.7
  printing: ^5.12.0
  file_picker: ^6.1.1
  
  # Excel Processing
  excel: ^4.0.3
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/
    - assets/icons/
    - assets/images/

